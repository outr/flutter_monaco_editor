<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>flutter_monaco_editor host</title>
<style>
  /* Transparent by default — Monaco's active theme (`editor.background`)
     fills the editor area. Apps that want an opaque host page can override
     this via their theme color or a CSS injection. */
  html, body, #monaco-root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
</style>
</head>
<body>
<div id="monaco-root"></div>
<script src="./monaco_bridge.js"></script>
<script>
  // --------------------------------------------------------------------
  // Native transport shim.
  //
  // The page runs inside `webview_flutter`. Dart <-> JS communication:
  //   JS -> Dart:   FmeChannel.postMessage(JSON.stringify({type, payload}))
  //   Dart -> JS:   WebViewController.runJavaScript("window.__fmeDispatch(...)")
  // --------------------------------------------------------------------

  (function () {
    if (!window.monacoBridge) return;

    // 1. Route monacoBridge.emit through the JavaScriptChannel.
    window.monacoBridge.setEmitter(function (type, payload) {
      try {
        var msg = JSON.stringify({ type: type, payload: payload });
        if (window.FmeChannel && typeof window.FmeChannel.postMessage === 'function') {
          window.FmeChannel.postMessage(msg);
        }
      } catch (e) {
        // Channel may not be ready during the very first frame — that's OK,
        // Monaco will emit more events shortly.
      }
    });

    // 2. Expose __fmeDispatch so Dart can call into monacoBridge asynchronously.
    window.__fmeDispatch = function (frame) {
      try {
        var obj = typeof frame === 'string' ? JSON.parse(frame) : frame;
        window.monacoBridge.invokeAsync(obj.callId, obj.method, obj.args || {});
      } catch (e) {
        window.monacoBridge.emit('_return', {
          callId: (frame && frame.callId) || 'unknown',
          error: String(e && e.message || e),
        });
      }
    };

    // 3. Kick off Monaco — the vs/ tree sits next to this HTML file.
    window.monacoBridge.invoke('bridge.init', { vsPath: '../monaco-min/vs' });
  })();
</script>
</body>
</html>
